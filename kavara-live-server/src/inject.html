<script>
  (function() {
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const host = window.location.host;
    const socket = new WebSocket(`${protocol}//${host}/_kavara_live_reload`);

    console.log('[kv] Connecting to live server...');

    socket.onopen = () => {
      console.log('[kv] Connected to live server');
    };

    socket.onmessage = (event) => {
      if (event.data === 'reload') {
        console.log('[kv] Reloading...');
        window.location.reload();
      }
    };

    socket.onclose = () => {
      console.log('[kv] Disconnected from live server');
      // Optional: Try to reconnect?
    };
  })();
</script>
